version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped

    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC

    volumes:
      - qdrant_storage:/qdrant/storage

    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/collections"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qdrant_storage: